<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ÉclaireSkin — AI Skincare Advisor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--sd:#5A7A5A;--sage:#6B8F6B;--sl:#EFF3EE;--warm:#A07840;--bg:#F8F4EE;--card:#fff;--border:#E0E0D8;--text:#2C2C28;--muted:#5C5C52;--bgsec:#F3F0EA;}
@media(prefers-color-scheme:dark){:root{--bg:#1A1A18;--card:#242420;--border:#3A3A35;--text:#E8E4DC;--muted:#B8B8AC;--bgsec:#2A2A26;--sl:#D0D8D0;--warm:#C9A97A;--sage:#8A9E8A;}}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0;}
.shell{width:100%;max-width:600px;background:var(--card);min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:linear-gradient(135deg,#3D5C3D 0%,#5A7A5A 50%,#6B8F6B 100%);padding:20px 20px 16px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#EFF3EE;letter-spacing:0.03em;}
.hdr p{font-size:11px;color:rgba(239,243,238,0.65);margin-top:2px;font-weight:300;}
.pb{height:3px;background:rgba(255,255,255,0.2);margin-top:10px;border-radius:2px;display:none;}
.pf{height:3px;background:#EFF3EE;border-radius:2px;transition:width 0.4s;}
.sl{font-size:11px;color:rgba(239,243,238,0.55);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase;display:none;}
.nav{display:none;}
.nb{flex:1;min-width:58px;padding:14px 4px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;letter-spacing:0.03em;text-transform:uppercase;transition:color 0.15s;white-space:nowrap;}
.nb i{font-size:20px;}
.nb.on{color:var(--sd);border-bottom-color:var(--sd);}
.pnl{padding:20px 20px 24px;flex:1;overflow-y:auto;}
.lbl{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:10px;letter-spacing:0.01em;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:#EFF3EE;color:#3A5A3A;border:1px solid #C5D5C5;}
.tag.w{background:var(--wl);color:#7A5A2A;border-color:#DFC9A0;}
.tag.r{background:#FCEBEB;color:#A32D2D;border-color:#F0BABA;}
.ai-box{background:var(--bgsec);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.7;margin:10px 0;}
.dots{display:inline-flex;gap:3px;align-items:center;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:b 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes b{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.btn{width:100%;padding:12px;background:var(--sd);color:#EFF3EE;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--sage);}
.btn:disabled{background:#aaa;cursor:not-allowed;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(90,122,90,0.4);}70%{box-shadow:0 0 0 8px rgba(90,122,90,0);}100%{box-shadow:0 0 0 0 rgba(90,122,90,0);}}
.btn.pulse{animation:pulse 1.8s ease-in-out infinite;}
.btn-out{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;}
.btn-out:hover{background:var(--bgsec);}
.btn-sm{padding:7px 13px;background:var(--sd);color:#EFF3EE;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-sm:hover{background:var(--sage);}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.opt-grid.c1{grid-template-columns:1fr;}
.ob{border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;background:var(--card);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.ob:active{transform:scale(0.97);background:var(--bgsec);}
.ob:focus{outline:none;}
.ob:hover{border-color:var(--sd);background:var(--bgsec);}
.ob.sel{border-color:var(--sd);background:#EFF3EE;}
.ob.sel .oi{background:var(--sd);color:#EFF3EE;}
.oi{width:28px;height:28px;border-radius:7px;background:var(--bgsec);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.15s;}
.on-name{font-size:12px;font-weight:500;color:var(--text);}
.on-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ob.sel .on-name{color:#3A5A3A;}
.qfooter{display:flex;gap:8px;padding:0 20px 20px;flex-shrink:0;}
.q-back{padding:10px 16px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:70px;background:var(--card);line-height:1.6;margin-bottom:8px;}
textarea:focus{outline:none;border-color:var(--sd);}
.upload-zone{border:1.5px dashed var(--sage);border-radius:10px;padding:20px;text-align:center;background:var(--bgsec);cursor:pointer;position:relative;overflow:hidden;margin-bottom:12px;transition:background 0.15s;}
.upload-zone:hover{background:#E6EDE6;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.preview-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:none;}
.res{border:0.5px solid var(--border);border-radius:12px;margin-top:14px;display:none;overflow:hidden;}
.res.show{display:block;}
.res-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--text);padding:14px 16px 0;display:flex;align-items:center;gap:6px;letter-spacing:0.01em;}
.res-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;padding:10px 16px 14px;}
.routine-section{margin-bottom:24px;}
.routine-section.morning{background:linear-gradient(135deg,rgba(250,240,224,0.4) 0%,transparent 100%);border-radius:12px;padding:14px;margin-left:-14px;margin-right:-14px;}
.routine-section.evening{background:linear-gradient(135deg,rgba(26,26,24,0.04) 0%,transparent 100%);border-radius:12px;padding:14px;margin-left:-14px;margin-right:-14px;}
.routine-section-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--sd);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--border);letter-spacing:0.02em;}
.routine-step{border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;background:var(--card);}
.routine-step-name{font-size:13px;font-weight:600;color:var(--sd);margin-bottom:6px;}
.routine-step-body{font-size:12px;color:var(--text);line-height:1.7;}
.routine-step-body .step-row{margin-bottom:3px;}
.routine-step-body .step-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;}
.routine-fallback{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;padding:4px 0;}
.disclaimer{background:var(--bgsec);border-top:0.5px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-start;}
.disclaimer i{font-size:14px;color:var(--muted);flex-shrink:0;margin-top:1px;}
.disclaimer p{font-size:11px;color:var(--muted);line-height:1.6;}
.saved-badge{display:inline-flex;align-items:center;gap:4px;background:#EFF3EE;color:var(--sd);font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px;border:1px solid #C5D5C5;}
.empty-state{text-align:center;padding:28px 20px;color:var(--muted);}
.empty-state i{font-size:34px;color:var(--border);margin-bottom:10px;display:block;}
.empty-state p{font-size:13px;line-height:1.6;}
.notice{background:var(--bgsec);border-left:3px solid var(--sd);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:0.2s;}
.toggle input:checked+.tslider{background:var(--sd);}
.tslider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.tslider:before{transform:translateX(18px);}
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);}
.notif-row:last-child{border-bottom:none;}
.n-title{font-size:13px;font-weight:500;color:var(--text);}
.n-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.time-pick{padding:5px 9px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:var(--card);margin-top:6px;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.filter-check{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;background:var(--card);transition:all 0.15s;}
.filter-check:hover{border-color:var(--sd);}
.filter-check.on{border-color:var(--sd);background:#EFF3EE;}
.filter-check .fc-box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.filter-check.on .fc-box{background:var(--sd);border-color:var(--sd);}
.filter-check .fc-lbl{font-size:12px;color:var(--text);}
.filter-check.on .fc-lbl{color:#3A5A3A;font-weight:500;}
.alt-box{background:#EAF3DE;border:1px solid #C0DD97;border-radius:10px;padding:12px 14px;margin-top:12px;display:none;}
.alt-box.show{display:block;}
.alt-box-title{font-size:12px;font-weight:500;color:#3B6D11;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.alt-box-body{font-size:12px;color:#27500A;line-height:1.7;white-space:pre-wrap;}
.ing-mode-row{display:flex;gap:6px;margin-bottom:14px;}
.im-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s;letter-spacing:0.03em;text-transform:uppercase;}
.im-btn i{font-size:18px;}
.im-btn:hover{border-color:var(--sd);}
.im-btn.on{border-color:var(--sd);background:#EFF3EE;color:#3A5A3A;}
.scan-frame{background:var(--bgsec);border:1.5px dashed var(--sage);border-radius:10px;padding:28px 20px;text-align:center;margin-bottom:12px;}
.scan-frame i{font-size:36px;color:var(--sd);margin-bottom:8px;display:block;}
.scan-frame p{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.scan-frame small{font-size:11px;color:var(--muted);}
.news-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cat-chip{padding:6px 13px;border-radius:16px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.cat-chip:hover{border-color:var(--sd);}
.cat-chip.on{background:var(--sd);border-color:var(--sd);color:#EFF3EE;font-weight:500;}
.article-card{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s;}
.article-card:hover{border-color:var(--sd);}
.article-body{padding:14px 16px;}
.article-cat{font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--sd);margin-bottom:5px;}
.article-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px;}
.article-preview{font-size:12px;color:var(--muted);line-height:1.6;}
.article-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:0.5px solid var(--border);background:var(--bgsec);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:14px;padding:0;}
.back-btn:hover{color:var(--sd);}
.article-full-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:12px;}
.article-full-body{font-size:13px;color:var(--text);line-height:1.85;white-space:pre-wrap;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:var(--card);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
.bnav .nb{flex:1;padding:12px 4px 8px;border:none;border-top:2px solid transparent;border-bottom:none;font-size:11px;text-transform:capitalize;letter-spacing:0.01em;}
.bnav .nb.on{border-top-color:var(--sd);border-bottom:none;}
.bnav .nb i{font-size:22px;}
.pnl{padding-bottom:100px;}
</style>

  {id:'age_range',title:'What is your age range?',sub:'Helps us recommend the right actives for your skin stage.',multi:false,cols:2,opts:[{icon:'ti-stars',name:'Under 25',desc:''},{icon:'ti-leaf',name:'25–34',desc:''},{icon:'ti-plant',name:'35–44',desc:''},{icon:'ti-tree',name:'45–54',desc:''},{icon:'ti-sun',name:'55+',desc:''}]},

];

const ARTICLES=[
  {id:1,cat:'Pregnancy',icon:'ti-heart',tag:'Essential read',title:'Skincare ingredients to avoid during pregnancy',preview:"Retinol, high-dose salicylic acid, and certain essential oils are commonly flagged.",body:"During pregnancy, some ingredients are best avoided.\n\nAvoid:\n- Retinol & retinoids - linked to birth defects at high doses\n- High-concentration salicylic acid\n- Hydroquinone - high absorption rate\n- Chemical sunscreens (oxybenzone) - switch to mineral SPF\n- Strong essential oils (rosemary, clary sage)\n\nSafe alternatives:\n- Niacinamide, Vitamin C, Hyaluronic acid\n- Azelaic acid - safe for acne and pigmentation\n- Mineral SPF (zinc oxide)\n- Low-concentration glycolic acid\n\nAlways consult your midwife or dermatologist."},
  {id:2,cat:'Ingredients',icon:'ti-flask',tag:'Ingredient guide',title:'Niacinamide: the ingredient your skin probably needs',preview:"One of the most versatile actives - here's what it actually does.",body:"Niacinamide (vitamin B3) is one of the best-studied skincare ingredients.\n\nWhat it does:\n- Reduces pore appearance\n- Fades dark spots\n- Strengthens the skin barrier\n- Calms redness and inflammation\n- Improves skin texture\n\nBest concentration: 5-10%.\nApply after cleansing, before heavier moisturisers.\nWorks well with most other actives."},

async function claude(messages,system){var r=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,system:system,messages:messages})});var d=await r.json();return d.content&&d.content[0]?d.content[0].text:'Unable to generate response.';}
function parseRoutineText(txt){txt=txt.replace(/#{1,3}\s*/g,'').replace(/\*\*/g,'').replace(/^---+$/gm,'').replace(/^\*(.+)\*$/gm,'$1');var sections=[];var lines=txt.split('\n');var current=null;var currentStep=null;lines.forEach(function(line){var l=line.trim();if(!l)return;if(/^YOUR (MORNING|EVENING) ROUTINE/i.test(l)){if(currentStep&&current)current.steps.push(currentStep);currentStep=null;current={title:l,steps:[],notes:[]};sections.push(current);return;}if(/^(GOOD TO KNOW|IMPORTANT NOTES)/i.test(l)){if(currentStep&&current)current.steps.push(currentStep);currentStep=null;current={title:l,steps:[],notes:[],isNotes:true};sections.push(current);return;}if(!current){current={title:'',steps:[],notes:[],isNotes:true};sections.push(current);}var stepMatch=l.match(/^Step\s*\d+[:.]\s*(.+)/i);if(stepMatch){if(currentStep)current.steps.push(currentStep);currentStep={name:stepMatch[1],rows:[]};return;}var rowMatch=l.match(/^(What to look for|Why you need it|How to use it|Ingredients to look for|Why)[:\s]+(.+)/i);if(rowMatch&&currentStep){currentStep.rows.push({label:rowMatch[1],text:rowMatch[2]});return;}if(currentStep){if(currentStep.rows.length>0){currentStep.rows[currentStep.rows.length-1].text+=' '+l;}else{currentStep.rows.push({label:'',text:l});}}else if(current){current.notes.push(l);}});if(currentStep&&current)current.steps.push(currentStep);return sections;}
function renderRoutineOutput(txt,targetId){var el=document.getElementById(targetId);if(!el)return;var sections=parseRoutineText(txt);if(!sections.length){el.innerHTML='<div class="routine-fallback">'+txt+'</div>';return;}var html=sections.map(function(sec){var sectionClass=sec.title.match(/MORNING/i)?'morning':sec.title.match(/EVENING/i)?'evening':'';if(sec.isNotes){var notesHtml=sec.notes.map(function(n){return '<div class="step-row">'+n+'</div>';}).join('');return '<div class="routine-section '+sectionClass+'"><div class="routine-section-title">'+sec.title+'</div><div class="routine-step-body">'+notesHtml+'</div></div>';}var stepsHtml=sec.steps.map(function(step){var rowsHtml=step.rows.map(function(r){return '<div class="step-row">'+(r.label?'<span class="step-label">'+r.label+':</span> ':'')+r.text+'</div>';}).join('');return '<div class="routine-step"><div class="routine-step-name">'+step.name+'</div><div class="routine-step-body">'+rowsHtml+'</div></div>';}).join('');return '<div class="routine-section '+sectionClass+'"><div class="routine-section-title">'+sec.title+'</div>'+stepsHtml+'</div>';}).join('');el.innerHTML=html||'<div class="routine-fallback">'+txt+'</div>';}

function analysisHTML(){return profileBanner()+'<img id="prev" class="preview-img" alt="Skin photo"/><div class="upload-zone" id="upz"><input type="file" accept="image/*" onchange="handleImg(event)"/><i class="ti ti-photo-up" style="font-size:28px;color:var(--sd);"></i><div style="font-family:\'Cormorant Garamond\',serif;font-size:17px;font-weight:400;color:var(--text);margin-top:8px;">Your skin has a story.</div><div style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;">Upload a close-up photo and let\'s read it together.<br>Natural light works best — no filter needed.</div></div><div class="lbl">Any extra notes?</div><textarea id="anotes" placeholder="e.g. My skin gets oily by midday..." style="min-height:60px;"></textarea><button class="btn" id="btn-a" onclick="runAnalysis()">Read my skin <i class="ti ti-arrow-right"></i></button>'+resBox('res-a','ti-sparkles','var(--sd)','Skin analysis & ingredient recommendations');}

function ingredientsHTML(){var af=[];if(isPregnant())af.push('pregnancy-safe');if(isSensitive())af.push('fragrance-free');var an=af.length?'<div class="notice"><i class="ti ti-adjustments" style="color:var(--sd);margin-right:5px;"></i>Auto-applied from profile: <strong>'+af.join(', ')+'</strong></div>':'';return profileBanner()+an+'<div class="ing-mode-row"><button class="im-btn on" id="im-photo" onclick="ingMode(\'photo\')"><i class="ti ti-camera"></i>Label photo</button><button class="im-btn" id="im-search" onclick="ingMode(\'search\')"><i class="ti ti-search"></i>Product name</button><button class="im-btn" id="im-paste" onclick="ingMode(\'paste\')"><i class="ti ti-clipboard-text"></i>Paste list</button></div><div id="ing-area"><img id="ing-prev" class="preview-img" alt="Label"/><div class="upload-zone" id="ing-upz"><input type="file" accept="image/*" onchange="handleIngImg(event)"/><i class="ti ti-camera" style="font-size:26px;color:var(--sd);"></i><div style="font-size:13px;font-weight:500;color:var(--text);margin-top:6px;">Photograph the ingredient label</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Claude reads ingredients from the photo</div></div><button class="btn" id="btn-ing" onclick="runIng()" disabled>Analyse label <i class="ti ti-arrow-right"></i></button></div><div class="res" id="res-ing"><div class="res-title"><i class="ti ti-flask" style="color:var(--sd);"></i> Ingredient breakdown</div><div class="res-content" id="res-ing-txt"></div><div class="alt-box" id="alt-box"><div class="alt-box-title"><i class="ti ti-bulb"></i> Better ingredient alternatives for your skin</div><div class="alt-box-body" id="alt-box-txt"></div></div>'+DISCLAIMER+'</div>';}

function routineHTML(){var exp=expLevel();var isBasic=exp<=2;var ff=ROUTINE_FILTERS.map(function(f){var ao=(f.id==='pregnancy_safe'&&isPregnant())||(f.id==='fragrance_free'&&isSensitive());var on=ao||routineFilters.includes(f.id);return '<div class="filter-check'+(on?' on':'')+'" onclick="toggleFilter(\''+f.id+'\','+ao+')" id="fc-'+f.id+'"><div class="fc-box">'+(on?'<i class="ti ti-check" style="font-size:11px;color:#EFF3EE;"></i>':'')+'</div><span class="fc-lbl">'+f.label+(ao?' (auto)':'')+'</span></div>';}).join('');var saved=savedRoutine?'<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div class="card-title">Saved routine</div><span class="saved-badge"><i class="ti ti-device-floppy"></i> '+savedRoutine.savedAt+'</span></div><div style="font-size:13px;color:var(--text);line-height:1.85;white-space:pre-wrap;">'+savedRoutine.text+'</div><button class="btn-out" onclick="clearRoutine()"><i class="ti ti-trash"></i> Clear saved routine</button></div>':'<div class="empty-state"><i class="ti ti-calendar-check"></i><p>No saved routine yet.<br>Build one below.</p></div>';var toggle='<div style="display:flex;gap:8px;margin-bottom:12px;"><button onclick="setRoutineMode(true)" style="flex:1;padding:10px 8px;border-radius:9px;border:1.5px solid '+(isBasic?'var(--sd)':'var(--border)')+';background:'+(isBasic?'#EFF3EE':'var(--card)')+';color:'+(isBasic?'#3A5A3A':'var(--muted)')+';font-family:DM Sans,sans-serif;font-size:12px;font-weight:'+(isBasic?500:400)+';cursor:pointer;"><i class="ti ti-leaf" style="display:block;font-size:16px;margin:0 auto 3px;"></i>Beginner<div style="font-size:10px;opacity:0.7;margin-top:2px;">Plain English guide</div></button><button onclick="setRoutineMode(false)" style="flex:1;padding:10px 8px;border-radius:9px;border:1.5px solid '+(!isBasic?'var(--sd)':'var(--border)')+';background:'+(!isBasic?'#EFF3EE':'var(--card)')+';color:'+(!isBasic?'#3A5A3A':'var(--muted)')+';font-family:DM Sans,sans-serif;font-size:12px;font-weight:'+(!isBasic?500:400)+';cursor:pointer;"><i class="ti ti-microscope" style="display:block;font-size:16px;margin:0 auto 3px;"></i>Advanced<div style="font-size:10px;opacity:0.7;margin-top:2px;">Ingredient detail</div></button></div><div style="background:'+(isBasic?'#EFF3EE':'var(--bgsec)')+';border-radius:8px;padding:9px 12px;font-size:12px;color:'+(isBasic?'#3A5A3A':'var(--muted)')+';margin-bottom:14px;line-height:1.5;">'+(isBasic?'You will get a step-by-step plain English guide in the correct order, what to buy, and how to use it.':'You will get ingredient-level detail with layering and conflict notes.')+'</div>';return profileBanner()+saved+'<div class="card"><div class="card-title" style="margin-bottom:12px;">Build a new routine</div>'+(isPregnant()?'<div class="notice" style="margin-bottom:12px;border-left-color:#A32D2D;"><i class="ti ti-heart" style="color:#A32D2D;margin-right:5px;"></i> Pregnancy or breastfeeding detected - unsafe ingredients excluded automatically.</div>':'')+'<div class="lbl">Mode</div>'+toggle+'<div class="lbl">Filters</div><div class="filter-grid">'+ff+'</div><div class="lbl">Preferred brands? (optional)</div><input id="user-brands" type="text" placeholder="e.g. CeraVe, The Ordinary, Neutrogena..." style="width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;color:var(--text);background:var(--card);margin-bottom:8px;"/><div style="font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5;"><i class="ti ti-info-circle" style="font-size:12px;"></i> We will suggest product lines from these brands that suit your skin. No ads or commissions - suggestions are based on your skin profile only.</div><div class="lbl">Want to add specific steps? (optional)</div><textarea id="extra-steps" placeholder="e.g. I want to include a toner, I already use a vitamin C serum..." style="min-height:50px;"></textarea><div class="lbl">Anything else to add?</div><textarea id="rnotes" placeholder="'+(isBasic?'e.g. I want to keep it simple, about 5 minutes morning and night...':'e.g. I already use vitamin C, avoiding exfoliants this month...')+'" style="min-height:50px;"></textarea><button class="btn" id="btn-r" onclick="runRoutine()">Create my ritual <i class="ti ti-arrow-right"></i></button></div>'+resBox('res-r','ti-sun','var(--warm)','Your personalised routine')+'<div id="save-r-wrap" style="display:none;margin-top:8px;"><button class="btn" id="btn-save-r" onclick="saveThisRoutine()"><i class="ti ti-device-floppy"></i> Save this routine</button></div>';}

function newsHTML(){var cats=['All','Pregnancy','Ingredients','Routine','Pores & Texture','Sun protection'];var filtered=newscat==='All'?ARTICLES:ARTICLES.filter(function(a){return a.cat===newscat;});if(openArticle){var a=ARTICLES.find(function(x){return x.id===openArticle;});if(a)return '<button class="back-btn" onclick="openArticle=null;renderApp(\'news\')"><i class="ti ti-arrow-left"></i> Back</button><div class="card"><div style="font-size:11px;font-weight:500;color:var(--sd);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">'+a.cat+'</div><div class="article-full-title">'+a.title+'</div><div class="article-full-body">'+a.body+'</div><div style="margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);font-size:11px;color:var(--muted);line-height:1.6;"><i class="ti ti-info-circle" style="font-size:12px;"></i> AI-generated content for general information only.</div></div>';}var catH=cats.map(function(c){return '<button class="cat-chip'+(c===newscat?' on':'')+'" onclick="newscat=\''+c+'\';renderApp(\'news\')">'+c+'</button>';}).join('');var cardsH=filtered.map(function(a){return '<div class="article-card" onclick="openArticle='+a.id+';renderApp(\'news\')"><div class="article-body"><div class="article-cat"><i class="ti '+a.icon+'" style="font-size:12px;margin-right:4px;"></i>'+a.cat+'</div><div class="article-title">'+a.title+'</div><div class="article-preview">'+a.preview+'</div></div><div class="article-footer"><span style="font-size:11px;color:var(--muted);">'+a.tag+'</span><i class="ti ti-arrow-right" style="font-size:14px;color:var(--sd);"></i></div></div>';}).join('');return '<div style="font-family:\'Cormorant Garamond\',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:5px;">Tips & news</div><div style="font-size:13px;color:var(--muted);margin-bottom:16px;font-weight:300;">Evidence-based skincare guides.</div><div class="news-cats">'+catH+'</div>'+(cardsH||'<div class="empty-state"><i class="ti ti-news"></i><p>No articles in this category.</p></div>');}

function settingsHTML(){var notifs=[{id:'am',title:'Morning reminder',sub:'AM skincare routine',time:'07:30'},{id:'pm',title:'Evening reminder',sub:'PM skincare routine',time:'21:00'},{id:'weekly',title:'Weekly check-in',sub:'Review how your skin is doing',time:'09:00'}];var gs=function(id){try{return JSON.parse(localStorage.getItem('notif_'+id)||JSON.stringify({on:false,time:notifs.find(function(n){return n.id===id;}).time}));}catch(e){return {on:false,time:'08:00'};}};var rows=notifs.map(function(n){var s=gs(n.id);return '<div class="notif-row" id="nrow-'+n.id+'"><div style="flex:1;"><div class="n-title">'+n.title+'</div><div class="n-sub">'+n.sub+'</div>'+(s.on?'<input type="time" class="time-pick" id="ntime-'+n.id+'" value="'+s.time+'" onchange="saveNotif(\''+n.id+'\')"/>':'')+'</div><label class="toggle"><input type="checkbox" '+(s.on?'checked':'')+' onchange="toggleNotif(\''+n.id+'\',\''+n.time+'\')"/><span class="tslider"></span></label></div>';}).join('');return '<div class="card"><div class="card-title" style="margin-bottom:4px;">Routine reminders</div><div style="font-size:12px;color:var(--muted);margin-bottom:14px;">Browser notifications - must have the app open.</div>'+rows+'</div><div class="card"><div class="card-title" style="margin-bottom:4px;">Your profile</div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;">'+(profile?'Skin profile saved on this device.':'No profile saved yet.')+'</div><button class="btn-sm" onclick="step=0;showQuiz()"><i class="ti ti-refresh"></i> '+(profile?'Retake quiz':'Start quiz')+'</button>'+(profile?'<button class="btn-out" onclick="clearProfile()"><i class="ti ti-trash"></i> Clear profile</button>':'')+'</div><div style="font-size:11px;color:var(--muted);text-align:center;padding-bottom:4px;line-height:1.6;">All data stays on your device only.</div>';}

function handleImg(e){var f=e.target.files[0];if(!f)return;compressImg(f,1024,0.7,function(b64){imgB64=b64;var img=document.getElementById('prev');img.src='data:image/jpeg;base64,'+b64;img.style.display='block';document.getElementById('upz').style.cssText+='border-style:solid;border-color:var(--sd);';});}
function handleIngImg(e){var f=e.target.files[0];if(!f)return;compressImg(f,1024,0.7,function(b64){ingImgB64=b64;var img=document.getElementById('ing-prev');if(img){img.src='data:image/jpeg;base64,'+b64;img.style.display='block';}var b=document.getElementById('btn-ing');if(b)b.disabled=false;var z=document.getElementById('ing-upz');if(z)z.style.cssText+='border-style:solid;border-color:var(--sd)';});}

function ingMode(m){ingMode_=m;['photo','search','paste'].forEach(function(x){var b=document.getElementById('im-'+x);if(b)b.classList.toggle('on',x===m);});var area=document.getElementById('ing-area');if(m==='photo'){area.innerHTML='<img id="ing-prev" class="preview-img" alt="Label"/><div class="upload-zone" id="ing-upz"><input type="file" accept="image/*" onchange="handleIngImg(event)"/><i class="ti ti-camera" style="font-size:26px;color:var(--sd);"></i><div style="font-size:13px;font-weight:500;color:var(--text);margin-top:6px;">Photograph the ingredient label</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Claude reads ingredients directly from the photo</div></div><button class="btn" id="btn-ing" onclick="runIng()" '+(ingImgB64?'':'disabled')+'>Read this label <i class="ti ti-arrow-right"></i></button>';}else if(m==='search'){area.innerHTML='<div style="display:flex;gap:8px;margin-bottom:6px;"><input id="sq" style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:DM Sans,sans-serif;font-size:13px;color:var(--text);background:var(--card);" placeholder="e.g. CeraVe Moisturising Cream..." onkeydown="if(event.key===\'Enter\')doSearch()"/><button class="btn-sm" onclick="doSearch()"><i class="ti ti-search"></i></button></div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Type brand + product name for best results</div><div id="sresults"></div><button class="btn" id="btn-ing" onclick="runIng()" disabled>Read this product <i class="ti ti-arrow-right"></i></button>';}else{area.innerHTML='<textarea id="paste-ing" placeholder="e.g. Aqua, Niacinamide, Glycerin, Retinol, Parfum..."></textarea><button class="btn" id="btn-ing" onclick="runIng()">Read these ingredients <i class="ti ti-arrow-right"></i></button>';}}

async function doSearch(){var q=document.getElementById('sq').value.trim();if(!q)return;ingSearchPick=null;document.getElementById('btn-ing').disabled=true;document.getElementById('sresults').innerHTML='<div style="padding:12px;text-align:center;font-size:13px;color:var(--muted);"><div class="dots"><span></span><span></span><span></span></div></div>';try{var r=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,system:'Return ONLY a JSON array (no markdown) of up to 4 skincare products. Each: {"name":"","brand":"","type":"","icon":"ti-droplet or ti-sparkles or ti-sun or ti-leaf or ti-shield"}',messages:[{role:'user',content:'Find: "'+q+'"'}]})});var d=await r.json();var products=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());document.getElementById('sresults').innerHTML=products.map(function(p,i){return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid var(--border);border-radius:9px;margin-bottom:6px;cursor:pointer;background:var(--card);" id="sp-'+i+'" onclick="pickSearch('+i+',\''+((p.brand||'').replace(/'/g,"\\'")+'\',\''+(p.name||'').replace(/'/g,"\\'")+'\',\''+p.type||'')+'\'  )"><div class="oi"><i class="ti '+(p.icon||'ti-droplet')+'"></i></div><div><div style="font-size:13px;font-weight:500;color:var(--text);">'+p.name+'</div><div style="font-size:11px;color:var(--muted);">'+p.brand+' - '+p.type+'</div></div><i class="ti ti-circle-check" id="spck-'+i+'" style="margin-left:auto;font-size:17px;color:var(--sd);display:none;"></i></div>';}).join('');}catch(e){document.getElementById('sresults').innerHTML='<p style="font-size:13px;color:var(--muted);">No results - try paste instead.</p>';}}
function pickSearch(i,brand,name,type){document.querySelectorAll('[id^="spck-"]').forEach(function(el){el.style.display='none';});document.getElementById('spck-'+i).style.display='block';ingSearchPick={brand:brand,name:name,type:type};document.getElementById('btn-ing').disabled=false;}

var INGSYS='You are a cosmetic chemist. Analyse skincare ingredients in plain text:\n1. What this product does\n2. Key beneficial ingredients - name + function for this skin profile\n3. Potential irritants - flag with a warning and explain\n4. Unnecessary ingredients - flag anything that adds no value for this persons concerns\n5. Skin type fit - personalised verdict\n6. Verdict - one sentence\nUnder 350 words. No brand recommendations.';
function ingSys(){var pg=isPregnant()?'\nFlag pregnancy-unsafe ingredients (retinoids, high-dose salicylics, hydroquinone, chemical SPF) with AVOID DURING PREGNANCY.':'';var sf=isSensitive()?'\nFlag fragrance, essential oils, denatured alcohol with FRAGRANCE ALERT.':'';return INGSYS+pg+sf;}

async function runIng(){var btn=document.getElementById('btn-ing');btn.disabled=true;document.getElementById('res-ing').classList.add('show');document.getElementById('res-ing-txt').innerHTML='<div style="padding:14px 16px;"><div class="dots"><span></span><span></span><span></span></div></div>';var ab=document.getElementById('alt-box');if(ab)ab.classList.remove('show');var ctx=profileCtx();var pl='';try{var txt;if(ingMode_==='photo'&&ingImgB64){txt=await claude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:ingImgB64}},{type:'text',text:ctx+'\nRead ingredient list from this label and analyse for this person.'}]}],ingSys());}else if(ingMode_==='search'&&ingSearchPick){pl=ingSearchPick.brand+' '+ingSearchPick.name;txt=await claude([{role:'user',content:ctx+'\nAnalyse: '+pl+' ('+ingSearchPick.type+'). Note formula may vary.'}],ingSys());}else{var p=document.getElementById('paste-ing');if(!p||!p.value.trim()){alert('Please enter ingredients.');btn.disabled=false;return;}txt=await claude([{role:'user',content:ctx+'\nIngredients:\n'+p.value.trim()}],ingSys());}document.getElementById('res-ing-txt').innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:14px;color:var(--muted);font-style:italic;margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid var(--border);">Here\'s what we found in this product.</div><div class="routine-fallback">'+txt+'</div>';;await runAlts(ctx,pl);}catch(e){document.getElementById('res-ing-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}

async function runAlts(ctx,pl){var ab=document.getElementById('alt-box');var at=document.getElementById('alt-box-txt');if(!ab||!at)return;ab.classList.add('show');at.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';try{var prompt=pl?ctx+'\nSuggest 2-3 specific ingredient types that would work better than what was found in '+pl+' for this person. Explain what to look for on labels and why each suits them. Ingredient types only, no brand names. Concise.':ctx+'\nSuggest 2-3 ingredient types that would complement or improve this routine for this person. No brand names. Concise.';var txt=await claude([{role:'user',content:prompt}],'Skincare ingredient expert. Suggest better ingredient alternatives based on skin profile. Types only, no brands. Plain text, 2-3 suggestions.');at.textContent=txt;}catch(e){at.textContent='Unable to generate alternatives.';}}

function toggleFilter(id,autoOn){if(autoOn)return;var idx=routineFilters.indexOf(id);if(idx>-1)routineFilters.splice(idx,1);else routineFilters.push(id);var el=document.getElementById('fc-'+id);if(!el)return;var on=routineFilters.includes(id);el.classList.toggle('on',on);var box=el.querySelector('.fc-box');if(box)box.innerHTML=on?'<i class="ti ti-check" style="font-size:11px;color:#EFF3EE;"></i>':'';}

async function runAnalysis(){var btn=document.getElementById('btn-a');btn.disabled=true;setLoading('res-a','res-a-txt');var notes=document.getElementById('anotes').value.trim();var content=[];if(imgB64)content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgB64}});content.push({type:'text',text:profileCtx()+'\nNotes: '+(notes||'None')+'.'});try{var txt=await claude([{role:'user',content:content}],'You are a skincare advisor. Analyse skin in plain text:\n1. Skin assessment\n2. Key priorities - 2-3 focus areas\n3. Recommended ingredients - types + why they suit this person\n4. Ingredients to avoid\nWarm, evidence-based, under 350 words. No brand names.');document.getElementById('res-a-txt').innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:14px;color:var(--muted);font-style:italic;margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid var(--border);">Here\'s what your skin is telling us.</div><div class="routine-fallback">'+txt+'</div>';}catch(e){document.getElementById('res-a-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}

async function runRoutine(){var btn=document.getElementById('btn-r');btn.disabled=true;setLoading('res-r','res-r-txt');if(isPregnant()&&!routineFilters.includes('pregnancy_safe'))routineFilters.push('pregnancy_safe');if(isSensitive()&&!routineFilters.includes('fragrance_free'))routineFilters.push('fragrance_free');var notes=document.getElementById('rnotes')?document.getElementById('rnotes').value.trim():'';var extras=document.getElementById('extra-steps')?document.getElementById('extra-steps').value.trim():'';var extraNote=extras?'The user also wants to include: '+extras+'. Work these into the routine in the correct position.':'';try{var txt=await claude([{role:'user',content:profileCtx()+'\nFilters: '+(routineFilters.join(', ')||'none')+'.\nNotes: '+(notes||'None')+'. '+extraNote}],routineSys());renderRoutineOutput(txt,'res-r-txt');var wrap=document.getElementById('save-r-wrap');if(wrap)wrap.style.display='block';}catch(e){document.getElementById('res-r-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}

async function saveThisRoutine(){var txt=document.getElementById('res-r-txt').textContent;if(!txt)return;savedRoutine={text:txt,savedAt:new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})};stor('ec_routine',savedRoutine);var btn=document.getElementById('btn-save-r');btn.innerHTML='<i class="ti ti-circle-check"></i> Saved!';btn.disabled=true;setTimeout(function(){renderApp('routine');},1200);}
async function clearRoutine(){savedRoutine=null;stor('ec_routine',null);renderApp('routine');}
async function clearProfile(){if(!confirm('Clear your saved skin profile?'))return;profile=null;routineFilters=[];stor('ec_profile',null);step=0;showQuiz();}
function toggleNotif(id,defaultTime){var inp=document.querySelector('#nrow-'+id+' input[type=checkbox]');var on=inp.checked;try{localStorage.setItem('notif_'+id,JSON.stringify({on:on,time:defaultTime}));}catch(e){}if(on){Notification.requestPermission().then(function(p){if(p==='granted'){var parts=defaultTime.split(':').map(Number);var now=new Date(),target=new Date();target.setHours(parts[0],parts[1],0,0);if(target<=now)target.setDate(target.getDate()+1);setTimeout(function(){new Notification('EclaireSkin',{body:'Time for your skincare routine.'});},target-now);}});}renderApp('settings');}
function saveNotif(id){var t=document.getElementById('ntime-'+id);if(!t)return;try{var s=JSON.parse(localStorage.getItem('notif_'+id)||'{}');s.time=t.value;localStorage.setItem('notif_'+id,JSON.stringify(s));}catch(e){}}
load_();
</script>
