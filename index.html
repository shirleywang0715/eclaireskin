<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ÉclaireSkin — AI Skincare Advisor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--sd:#5A7A5A;--sage:#8A9E8A;--sl:#EFF3EE;--warm:#C9A97A;--wl:#FAF0E0;--bg:#F8F4EE;--card:#fff;--border:#E0E0D8;--text:#2C2C28;--muted:#7A7A6E;--bgsec:#F3F0EA;}
@media(prefers-color-scheme:dark){:root{--bg:#1A1A18;--card:#242420;--border:#3A3A35;--text:#E8E4DC;--muted:#9A9A8E;--bgsec:#2A2A26;--sl:#D0D8D0;}}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0;}
.shell{width:100%;max-width:600px;background:var(--card);min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--sd);padding:16px 20px 12px;flex-shrink:0;}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#EFF3EE;letter-spacing:0.02em;}
.hdr p{font-size:11px;color:rgba(239,243,238,0.65);margin-top:2px;font-weight:300;}
.pb{height:3px;background:rgba(255,255,255,0.2);margin-top:10px;border-radius:2px;display:none;}
.pf{height:3px;background:#EFF3EE;border-radius:2px;transition:width 0.4s;}
.sl{font-size:11px;color:rgba(239,243,238,0.55);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase;display:none;}
.nav{display:flex;background:var(--card);border-bottom:0.5px solid var(--border);overflow-x:auto;flex-shrink:0;}
.nb{flex:1;min-width:58px;padding:9px 4px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;letter-spacing:0.03em;text-transform:uppercase;transition:color 0.15s;white-space:nowrap;}
.nb i{font-size:16px;}
.nb.on{color:var(--sd);border-bottom-color:var(--sd);}
.pnl{padding:20px;flex:1;overflow-y:auto;}
.lbl{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--text);margin-bottom:8px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:#EFF3EE;color:#3A5A3A;border:1px solid #C5D5C5;}
.tag.w{background:var(--wl);color:#7A5A2A;border-color:#DFC9A0;}
.tag.r{background:#FCEBEB;color:#A32D2D;border-color:#F0BABA;}
.ai-box{background:var(--bgsec);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.7;margin:10px 0;}
.dots{display:inline-flex;gap:3px;align-items:center;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:b 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes b{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.btn{width:100%;padding:12px;background:var(--sd);color:#EFF3EE;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--sage);}
.btn:disabled{background:#aaa;cursor:not-allowed;}
.btn-out{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;}
.btn-out:hover{background:var(--bgsec);}
.btn-sm{padding:7px 13px;background:var(--sd);color:#EFF3EE;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-sm:hover{background:var(--sage);}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.opt-grid.c1{grid-template-columns:1fr;}
.ob{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--card);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:9px;}
.ob:hover{border-color:var(--sd);background:var(--bgsec);}
.ob.sel{border-color:var(--sd);background:#EFF3EE;}
.ob.sel .oi{background:var(--sd);color:#EFF3EE;}
.oi{width:28px;height:28px;border-radius:7px;background:var(--bgsec);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.15s;}
.on-name{font-size:12px;font-weight:500;color:var(--text);}
.on-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ob.sel .on-name{color:#3A5A3A;}
.qfooter{display:flex;gap:8px;padding:0 20px 20px;flex-shrink:0;}
.q-back{padding:10px 16px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:70px;background:var(--card);line-height:1.6;margin-bottom:8px;}
textarea:focus{outline:none;border-color:var(--sd);}
.upload-zone{border:1.5px dashed var(--sage);border-radius:10px;padding:20px;text-align:center;background:var(--bgsec);cursor:pointer;position:relative;overflow:hidden;margin-bottom:12px;transition:background 0.15s;}
.upload-zone:hover{background:#E6EDE6;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.preview-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:none;}
.res{border:0.5px solid var(--border);border-radius:12px;margin-top:14px;display:none;overflow:hidden;}
.res.show{display:block;}
.res-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--text);padding:14px 16px 0;display:flex;align-items:center;gap:6px;}
.res-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;padding:10px 16px 14px;}
.disclaimer{background:var(--bgsec);border-top:0.5px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-start;}
.disclaimer i{font-size:14px;color:var(--muted);flex-shrink:0;margin-top:1px;}
.disclaimer p{font-size:11px;color:var(--muted);line-height:1.6;}
.saved-badge{display:inline-flex;align-items:center;gap:4px;background:#EFF3EE;color:var(--sd);font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px;border:1px solid #C5D5C5;}
.empty-state{text-align:center;padding:28px 20px;color:var(--muted);}
.empty-state i{font-size:34px;color:var(--border);margin-bottom:10px;display:block;}
.empty-state p{font-size:13px;line-height:1.6;}
.notice{background:var(--bgsec);border-left:3px solid var(--sd);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:0.2s;}
.toggle input:checked+.tslider{background:var(--sd);}
.tslider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.tslider:before{transform:translateX(18px);}
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);}
.notif-row:last-child{border-bottom:none;}
.n-title{font-size:13px;font-weight:500;color:var(--text);}
.n-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.time-pick{padding:5px 9px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:var(--card);margin-top:6px;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.filter-check{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;background:var(--card);transition:all 0.15s;}
.filter-check:hover{border-color:var(--sd);}
.filter-check.on{border-color:var(--sd);background:#EFF3EE;}
.filter-check .fc-box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.filter-check.on .fc-box{background:var(--sd);border-color:var(--sd);}
.filter-check .fc-lbl{font-size:12px;color:var(--text);}
.filter-check.on .fc-lbl{color:#3A5A3A;font-weight:500;}
.alt-box{background:#EAF3DE;border:1px solid #C0DD97;border-radius:10px;padding:12px 14px;margin-top:12px;display:none;}
.alt-box.show{display:block;}
.alt-box-title{font-size:12px;font-weight:500;color:#3B6D11;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.alt-box-body{font-size:12px;color:#27500A;line-height:1.7;white-space:pre-wrap;}
.ing-mode-row{display:flex;gap:6px;margin-bottom:14px;}
.im-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s;letter-spacing:0.03em;text-transform:uppercase;}
.im-btn i{font-size:18px;}
.im-btn:hover{border-color:var(--sd);}
.im-btn.on{border-color:var(--sd);background:#EFF3EE;color:#3A5A3A;}
.scan-frame{background:var(--bgsec);border:1.5px dashed var(--sage);border-radius:10px;padding:28px 20px;text-align:center;margin-bottom:12px;}
.scan-frame i{font-size:36px;color:var(--sd);margin-bottom:8px;display:block;}
.scan-frame p{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.scan-frame small{font-size:11px;color:var(--muted);}
.news-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cat-chip{padding:6px 13px;border-radius:16px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.cat-chip:hover{border-color:var(--sd);}
.cat-chip.on{background:var(--sd);border-color:var(--sd);color:#EFF3EE;font-weight:500;}
.article-card{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s;}
.article-card:hover{border-color:var(--sd);}
.article-body{padding:14px 16px;}
.article-cat{font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--sd);margin-bottom:5px;}
.article-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px;}
.article-preview{font-size:12px;color:var(--muted);line-height:1.6;}
.article-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:0.5px solid var(--border);background:var(--bgsec);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:14px;padding:0;}
.back-btn:hover{color:var(--sd);}
.article-full-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:12px;}
.article-full-body{font-size:13px;color:var(--text);line-height:1.85;white-space:pre-wrap;}
</style>
</head>
<body>
<div class="shell" id="app">
  <div class="hdr">
    <h1>ÉclaireSkin</h1>
    <p id="hdr-sub">AI-powered skincare, personalised for you</p>
    <div class="pb" id="qpb"><div class="pf" id="qpf"></div></div>
    <div class="sl" id="qsl"></div>
  </div>
  <div id="main" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
</div>

<script>
const STEPS=[
  {id:'skin_type',title:'What is your skin type?',sub:'Choose the one that feels most like you.',multi:false,cols:2,opts:[{icon:'ti-droplet',name:'Oily',desc:'Shiny throughout the day'},{icon:'ti-wind',name:'Dry',desc:'Tight, sometimes flaky'},{icon:'ti-adjustments',name:'Combination',desc:'Oily T-zone, dry cheeks'},{icon:'ti-heart',name:'Sensitive',desc:'Reacts, reddens easily'},{icon:'ti-circle-check',name:'Normal',desc:'Balanced, rarely reacts'}]},
  {id:'concerns',title:'Main skin concerns?',sub:'Select all that apply.',multi:true,cols:2,opts:[{icon:'ti-mood-sad',name:'Acne & breakouts',desc:'Spots, congestion'},{icon:'ti-circle-dotted',name:'Pores & texture',desc:'Enlarged pores, roughness'},{icon:'ti-droplet-off',name:'Dryness',desc:'Dehydration, patches'},{icon:'ti-flame',name:'Redness',desc:'Flushing, irritation'},{icon:'ti-sun',name:'Dark spots',desc:'Post-acne, sun damage'},{icon:'ti-clock',name:'Fine lines',desc:'Ageing, firmness'},{icon:'ti-color-swatch',name:'Uneven tone',desc:'Dullness, blotchiness'},{icon:'ti-eye',name:'Dark circles',desc:'Under-eye shadows'},{icon:'ti-activity',name:'Hormonal breakouts',desc:'Chin or jaw area'},{icon:'ti-shield-off',name:'Compromised barrier',desc:'Stinging, reactive'}]},
  {id:'triggers',title:'Any skin triggers?',sub:'Helps us flag things to avoid.',multi:true,cols:2,opts:[{icon:'ti-droplet',name:'Fragrance',desc:'Perfume or essential oils'},{icon:'ti-sun',name:'Sun sensitivity',desc:'Burns easily'},{icon:'ti-wind',name:'Weather changes',desc:'Cold, wind, humidity'},{icon:'ti-moon',name:'Stress & hormones',desc:'Cycle-related flare-ups'},{icon:'ti-bowl',name:'Diet',desc:'Food-triggered flare-ups'},{icon:'ti-circle-x',name:'No known triggers',desc:''}]},
  {id:'life_stage',title:'Any life stage to consider?',sub:'Some stages change what ingredients are safe.',multi:false,cols:2,opts:[{icon:'ti-heart',name:'Pregnant',desc:'Avoiding certain actives'},{icon:'ti-moon',name:'Breastfeeding',desc:'Extra caution with actives'},{icon:'ti-activity',name:'Perimenopause / menopause',desc:'Hormonal skin shifts'},{icon:'ti-stars',name:'Teen skin',desc:'Younger, oil-prone skin'},{icon:'ti-circle-check',name:'None of the above',desc:'Standard recommendations'}]},
  {id:'age_range',title:'Age range?',sub:'Helps us recommend the right actives.',multi:false,cols:2,opts:[{icon:'ti-stars',name:'Under 25',desc:''},{icon:'ti-leaf',name:'25–34',desc:''},{icon:'ti-plant',name:'35–44',desc:''},{icon:'ti-tree',name:'45–54',desc:''},{icon:'ti-sunshine',name:'55+',desc:''}]},
  {id:'environment',title:'Your environment?',sub:'Climate affects skin barrier and hydration.',multi:false,cols:2,opts:[{icon:'ti-cloud-rain',name:'Humid & warm',desc:'Tropical or coastal'},{icon:'ti-snowflake',name:'Cold & dry',desc:'Harsh winters'},{icon:'ti-sun',name:'Hot & dry',desc:'Arid climate'},{icon:'ti-building',name:'Urban & polluted',desc:'City, indoor AC'},{icon:'ti-world',name:'Temperate',desc:'Mild, seasonal'}]},
  {id:'routine_exp',title:'Your current routine?',sub:"We'll pitch at the right level.",multi:false,cols:1,opts:[{icon:'ti-droplet',name:'Bare minimum',desc:'Just a cleanser, maybe moisturiser'},{icon:'ti-list',name:'Basic routine',desc:'Cleanser, moisturiser, SPF'},{icon:'ti-layers',name:'Established routine',desc:'Multiple steps, some actives'},{icon:'ti-microscope',name:'Skincare enthusiast',desc:'I know my AHAs from my BHAs'}]},
  {id:'budget',title:'Budget preference?',sub:'Helps tailor recommendations.',multi:false,cols:1,opts:[{icon:'ti-coin',name:'Budget-friendly',desc:'Drugstore & affordable finds'},{icon:'ti-wallet',name:'Mid-range',desc:'Mix of affordable and premium'},{icon:'ti-diamond',name:'Luxury',desc:'Premium formulations'}]},
  {id:'goals',title:'Skin goal right now?',sub:'Your priority for the next 3 months.',multi:false,cols:2,opts:[{icon:'ti-sparkles',name:'Clear & calm skin',desc:'Reduce breakouts, redness'},{icon:'ti-circle-dotted',name:'Smooth & refined',desc:'Minimise pores, texture'},{icon:'ti-droplet',name:'Deep hydration',desc:'Plump, dewy skin'},{icon:'ti-sun',name:'Brightening',desc:'Even tone, glow'},{icon:'ti-clock',name:'Anti-ageing',desc:'Firmness, fine lines'},{icon:'ti-shield',name:'Barrier repair',desc:'Strengthen, protect'}]},
];
const ARTICLES=[
  {id:1,cat:'Pregnancy',icon:'ti-heart',tag:'Essential read',title:'Skincare ingredients to avoid during pregnancy',preview:"Retinol, high-dose salicylic acid, and certain essential oils are commonly flagged.",body:`During pregnancy, some ingredients are best avoided.\n\nAvoid:\n• Retinol & retinoids — linked to birth defects at high doses\n• High-concentration salicylic acid\n• Hydroquinone — high absorption rate\n• Chemical sunscreens (oxybenzone) — switch to mineral SPF\n• Strong essential oils (rosemary, clary sage)\n\nSafe alternatives:\n• Niacinamide, Vitamin C, Hyaluronic acid\n• Azelaic acid — safe for acne and pigmentation\n• Mineral SPF (zinc oxide)\n• Low-concentration glycolic acid\n\nAlways consult your midwife or dermatologist.`},
  {id:2,cat:'Ingredients',icon:'ti-flask',tag:'Ingredient guide',title:'Niacinamide: the ingredient your skin probably needs',preview:"One of the most versatile actives — here's what it actually does.",body:`Niacinamide (vitamin B3) is one of the best-studied skincare ingredients.\n\nWhat it does:\n• Reduces pore appearance\n• Fades dark spots\n• Strengthens the skin barrier\n• Calms redness and inflammation\n• Improves skin texture\n\nBest concentration: 5–10%.\nApply after cleansing, before heavier moisturisers.\nWorks well with most other actives.`},
  {id:3,cat:'Routine',icon:'ti-sun',tag:'How-to guide',title:'How to layer your skincare — in the right order',preview:'Getting the order wrong can stop products working. The simple rule.',body:`Rule: thinnest to thickest.\n\nAM: Cleanser → Toner (optional) → Serum → Moisturiser → SPF\nPM: Double cleanse → Toner (optional) → Treatment serum → Moisturiser\n\nKey rules:\n• Don't use retinol and AHAs same night when starting out\n• SPF is always last in the morning\n• Wait 60–90 seconds between steps if possible`},
  {id:4,cat:'Pores & Texture',icon:'ti-circle-dotted',tag:'Deep dive',title:'Why your pores look bigger — and what actually helps',preview:"Pores don't open and close. But their appearance can be improved.",body:`Pores can't be opened or closed — they're fixed structures.\n\nIngredients that help:\n• Niacinamide (5–10%) — regulates oil and tightens pore lining\n• Salicylic acid (BHA) — clears inside the pore\n• Retinol — boosts collagen over time\n• AHAs — exfoliate dead skin\n\nRealistic timeline: 8–12 weeks of consistent use.`},
  {id:5,cat:'Sun protection',icon:'ti-sun',tag:'Must know',title:'SPF: the one non-negotiable skincare step',preview:'No serum will do as much for your skin long-term as daily SPF.',body:`SPF is the most evidence-backed skin protection tool available.\n\nSPF 30 blocks ~97% UVB. SPF 50 blocks ~98%.\nConsistency matters more than a higher number.\n\nHow much: two finger lengths for the face.\n\nMineral (zinc oxide) — best for sensitive and pregnant skin.\nChemical — lighter texture, easier daily wear.\n\nReapply every 2 hours outdoors.`},
];
const DISCLAIMER='<div class="disclaimer"><i class="ti ti-info-circle"></i><p>This is AI-generated guidance for reference only — not medical advice. For personalised diagnosis or treatment, please consult a qualified dermatologist or skin health professional.</p></div>';
const ROUTINE_FILTERS=[{id:'fragrance_free',label:'Fragrance-free'},{id:'oil_free',label:'Oil-free'},{id:'fungal_acne_safe',label:'Fungal acne–safe'},{id:'pregnancy_safe',label:'Pregnancy-safe'},{id:'minimal',label:'Minimal (3 steps)'},{id:'no_retinol',label:'No retinol'},{id:'sensitive_skin',label:'Extra gentle'},{id:'silicone_free',label:'Silicone-free'}];
let step=0,sel=[],profile=null,savedRoutine=null,imgB64=null,ingImgB64=null,ingMode_='photo',ingSearchPick=null,newscat='All',openArticle=null,routineFilters=[],barcodeResult=null;
function stor(k,v){try{if(v===null)localStorage.removeItem(k);else localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load_(){try{const p=localStorage.getItem('ec_profile');if(p)profile=JSON.parse(p);const r=localStorage.getItem('ec_routine');if(r)savedRoutine=JSON.parse(r);}catch(e){}if(profile)enterApp();else showQuiz();}
function isPregnant(){return profile&&(profile.life_stage==='Pregnant'||profile.life_stage==='Breastfeeding');}
function isSensitive(){return profile&&(profile.skin_type==='Sensitive'||(profile.triggers||[]).includes('Fragrance'));}
let routineModeOverride=null;
function expLevel(){
  if(routineModeOverride!==null) return routineModeOverride;
  if(!profile)return 2;
  return {'Bare minimum':1,'Basic routine':2,'Established routine':3,'Skincare enthusiast':4}[profile.routine_exp]||2;
}
function setRoutineMode(basic){
  routineModeOverride=basic?1:4;
  renderApp('routine');
}
function profileCtx(){if(!profile)return '';const c=Array.isArray(profile.concerns)?profile.concerns.join(', '):'';const t=Array.isArray(profile.triggers)?profile.triggers.join(', '):'';const ls=profile.life_stage&&profile.life_stage!=='None of the above'?`Life stage: ${profile.life_stage}.`:'';return `Skin profile — Type: ${profile.skin_type}. Concerns: ${c}. Triggers: ${t}. ${ls} Age: ${profile.age_range}. Environment: ${profile.environment}. Experience: ${profile.routine_exp}. Budget: ${profile.budget}. Goal: ${profile.goals}.`;}
function routineSys(){
const exp=expLevel();
const sc=exp===1?3:exp===2?4:exp===3?5:6;
const pg=isPregnant()?'IMPORTANT: This person is pregnant or breastfeeding. Exclude ALL retinoids, retinol, high-dose salicylic acid, chemical sunscreens, hydroquinone. Pregnancy-safe only. Start with a clear warning.':'';
const sf=isSensitive()?'Fragrance-free and alcohol-free formulations only.':'';
const ff=routineFilters.map(f=>({fragrance_free:'All products fragrance-free.',oil_free:'All products oil-free and non-comedogenic.',fungal_acne_safe:'Fungal acne-safe only.',pregnancy_safe:'Pregnancy-safe only.',minimal:'3 steps MAX per routine.',no_retinol:'No retinol or retinoids.',sensitive_skin:'Extra gentle, no strong actives.',silicone_free:'Silicone-free only.'})[f]||'').filter(Boolean).join(' ');
const isBasic=exp<=2;

const rules=[
'Steps MUST be listed in the exact order to apply — top to bottom.',
'Eye cream always BEFORE retinoid/retinol.',
'Retinoid/retinol goes AFTER eye cream and serum, BEFORE moisturiser.',
'SPF is always the LAST step in the morning routine, after moisturiser.',
'Maximum '+sc+' steps per routine. Omit any step that adds no clear value.',
'Never name specific brands.',
pg, sf, ff
].filter(Boolean).join(' ');

if(isBasic){
return 'You are a warm, friendly skincare coach helping a complete beginner. '+rules+' Write in plain simple English — no jargon, no Latin ingredient names. For each product, describe what to look for in everyday language (e.g. "a gentle cream cleanser labelled for sensitive or normal skin") and include a rough price in NZD (e.g. "$8-20 at a pharmacy or supermarket"). For each step include: what to buy, why this person specifically needs it, exactly how to use it (amount and technique), and when (morning/evening/both). End with a short "Do not buy yet" section listing 1-2 things to skip for now and why. End with "This week: start with just [one step]." Use this exact format: YOUR MORNING ROUTINE (X steps, about X minutes) -- Step 1 - [Step name] -- What to buy: [plain English description + price] -- Why you need it: [personalised reason] -- How to use it: [exact instructions] -- [repeat for each step] --- YOUR EVENING ROUTINE (X steps, about X minutes) -- [same format] --- Do not buy yet: [items to skip] -- This week: [one sentence on where to start]';
}
return 'You are a skincare routine consultant for an experienced user. '+rules+' Use ingredient-level recommendations. For each step include the ingredient type to look for and why it suits this persons specific skin profile. Flag any ingredient conflicts or timing notes. Use this format: YOUR MORNING ROUTINE -- Step 1 - [Step name] -- Look for: [ingredient type + why for their skin] -- How: [application note] -- [repeat] --- YOUR EVENING ROUTINE -- [same format] --- Ingredients to avoid: [based on profile] -- Conflict notes: [timing warnings if any] -- Introduce first: [what to add first]';
}

async function runRoutine(){const btn=document.getElementById('btn-r');btn.disabled=true;setLoading('res-r','res-r-txt');if(isPregnant()&&!routineFilters.includes('pregnancy_safe'))routineFilters.push('pregnancy_safe');if(isSensitive()&&!routineFilters.includes('fragrance_free'))routineFilters.push('fragrance_free');const notes=document.getElementById('rnotes').value.trim();try{const txt=await claude([{role:'user',content:`${profileCtx()}\nFilters: ${routineFilters.join(', ')||'none'}.\nNotes: ${notes||'None'}`}],routineSys());document.getElementById('res-r-txt').textContent=txt;const wrap=document.getElementById('save-r-wrap');if(wrap)wrap.style.display='block';}catch(e){document.getElementById('res-r-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}
async function saveThisRoutine(){const txt=document.getElementById('res-r-txt').textContent;if(!txt)return;savedRoutine={text:txt,savedAt:new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})};stor('ec_routine',savedRoutine);const btn=document.getElementById('btn-save-r');btn.innerHTML='<i class="ti ti-circle-check"></i> Saved!';btn.disabled=true;setTimeout(()=>renderApp('routine'),1200);}
async function clearRoutine(){savedRoutine=null;stor('ec_routine',null);renderApp('routine');}
async function clearProfile(){if(!confirm('Clear your saved skin profile?'))return;profile=null;routineFilters=[];stor('ec_profile',null);step=0;showQuiz();}
function toggleNotif(id,defaultTime){const inp=document.querySelector(`#nrow-${id} input[type=checkbox]`);const on=inp.checked;try{localStorage.setItem('notif_'+id,JSON.stringify({on,time:defaultTime}));}catch(e){}if(on){Notification.requestPermission().then(p=>{if(p==='granted'){const [h,m]=defaultTime.split(':').map(Number);const now=new Date(),target=new Date();target.setHours(h,m,0,0);if(target<=now)target.setDate(target.getDate()+1);setTimeout(()=>new Notification('ÉclaireSkin',{body:'Time for your skincare routine.'}),target-now);}});}renderApp('settings');}
function saveNotif(id){const t=document.getElementById('ntime-'+id);if(!t)return;try{const s=JSON.parse(localStorage.getItem('notif_'+id)||'{}');s.time=t.value;localStorage.setItem('notif_'+id,JSON.stringify(s));}catch(e){}}
load_();
</script>
</body>
