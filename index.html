@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--sd:#5A7A5A;--sage:#8A9E8A;--sl:#EFF3EE;--warm:#C9A97A;--wl:#FAF0E0;--bg:#F8F4EE;--card:#fff;--border:#E0E0D8;--text:#2C2C28;--muted:#7A7A6E;--bgsec:#F3F0EA;}
@media(prefers-color-scheme:dark){:root{--bg:#1A1A18;--card:#242420;--border:#3A3A35;--text:#E8E4DC;--muted:#9A9A8E;--bgsec:#2A2A26;--sl:#D0D8D0;}}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0;}
.shell{width:100%;max-width:600px;background:var(--card);min-height:100vh;display:flex;flex-direction:column;}
.hdr{background:var(--sd);padding:16px 20px 12px;flex-shrink:0;}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#EFF3EE;letter-spacing:0.02em;}
.hdr p{font-size:11px;color:rgba(239,243,238,0.65);margin-top:2px;font-weight:300;}
.pb{height:3px;background:rgba(255,255,255,0.2);margin-top:10px;border-radius:2px;display:none;}
.pf{height:3px;background:#EFF3EE;border-radius:2px;transition:width 0.4s;}
.sl{font-size:11px;color:rgba(239,243,238,0.55);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase;display:none;}
.nav{display:flex;background:var(--card);border-bottom:0.5px solid var(--border);overflow-x:auto;flex-shrink:0;}
.nb{flex:1;min-width:58px;padding:9px 4px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;letter-spacing:0.03em;text-transform:uppercase;transition:color 0.15s;white-space:nowrap;}
.nb i{font-size:16px;}
.nb.on{color:var(--sd);border-bottom-color:var(--sd);}
.pnl{padding:20px;flex:1;overflow-y:auto;}
.lbl{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--text);margin-bottom:8px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;background:#EFF3EE;color:#3A5A3A;border:1px solid #C5D5C5;}
.tag.w{background:var(--wl);color:#7A5A2A;border-color:#DFC9A0;}
.tag.r{background:#FCEBEB;color:#A32D2D;border-color:#F0BABA;}
.ai-box{background:var(--bgsec);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.7;margin:10px 0;}
.dots{display:inline-flex;gap:3px;align-items:center;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--sage);animation:b 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes b{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.btn{width:100%;padding:12px;background:var(--sd);color:#EFF3EE;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--sage);}
.btn:disabled{background:#aaa;cursor:not-allowed;}
.btn-out{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;}
.btn-out:hover{background:var(--bgsec);}
.btn-sm{padding:7px 13px;background:var(--sd);color:#EFF3EE;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-sm:hover{background:var(--sage);}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.opt-grid.c1{grid-template-columns:1fr;}
.ob{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--card);cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:9px;}
.ob:hover{border-color:var(--sd);background:var(--bgsec);}
.ob.sel{border-color:var(--sd);background:#EFF3EE;}
.ob.sel .oi{background:var(--sd);color:#EFF3EE;}
.oi{width:28px;height:28px;border-radius:7px;background:var(--bgsec);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.15s;}
.on-name{font-size:12px;font-weight:500;color:var(--text);}
.on-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ob.sel .on-name{color:#3A5A3A;}
.qfooter{display:flex;gap:8px;padding:0 20px 20px;flex-shrink:0;}
.q-back{padding:10px 16px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:70px;background:var(--card);line-height:1.6;margin-bottom:8px;}
textarea:focus{outline:none;border-color:var(--sd);}
.upload-zone{border:1.5px dashed var(--sage);border-radius:10px;padding:20px;text-align:center;background:var(--bgsec);cursor:pointer;position:relative;overflow:hidden;margin-bottom:12px;transition:background 0.15s;}
.upload-zone:hover{background:#E6EDE6;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.preview-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:10px;display:none;}
.res{border:0.5px solid var(--border);border-radius:12px;margin-top:14px;display:none;overflow:hidden;}
.res.show{display:block;}
.res-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--text);padding:14px 16px 0;display:flex;align-items:center;gap:6px;}
.res-content{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;padding:10px 16px 14px;}
.disclaimer{background:var(--bgsec);border-top:0.5px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-start;}
.disclaimer i{font-size:14px;color:var(--muted);flex-shrink:0;margin-top:1px;}
.disclaimer p{font-size:11px;color:var(--muted);line-height:1.6;}
.saved-badge{display:inline-flex;align-items:center;gap:4px;background:#EFF3EE;color:var(--sd);font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px;border:1px solid #C5D5C5;}
.empty-state{text-align:center;padding:28px 20px;color:var(--muted);}
.empty-state i{font-size:34px;color:var(--border);margin-bottom:10px;display:block;}
.empty-state p{font-size:13px;line-height:1.6;}
.notice{background:var(--bgsec);border-left:3px solid var(--sd);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:0.2s;}
.toggle input:checked+.tslider{background:var(--sd);}
.tslider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.tslider:before{transform:translateX(18px);}
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);}
.notif-row:last-child{border-bottom:none;}
.n-title{font-size:13px;font-weight:500;color:var(--text);}
.n-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.time-pick{padding:5px 9px;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:var(--card);margin-top:6px;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.filter-check{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;background:var(--card);transition:all 0.15s;}
.filter-check:hover{border-color:var(--sd);}
.filter-check.on{border-color:var(--sd);background:#EFF3EE;}
.filter-check .fc-box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.filter-check.on .fc-box{background:var(--sd);border-color:var(--sd);}
.filter-check .fc-lbl{font-size:12px;color:var(--text);}
.filter-check.on .fc-lbl{color:#3A5A3A;font-weight:500;}
.alt-box{background:#EAF3DE;border:1px solid #C0DD97;border-radius:10px;padding:12px 14px;margin-top:12px;display:none;}
.alt-box.show{display:block;}
.alt-box-title{font-size:12px;font-weight:500;color:#3B6D11;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.alt-box-body{font-size:12px;color:#27500A;line-height:1.7;white-space:pre-wrap;}
.ing-mode-row{display:flex;gap:6px;margin-bottom:14px;}
.im-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s;letter-spacing:0.03em;text-transform:uppercase;}
.im-btn i{font-size:18px;}
.im-btn:hover{border-color:var(--sd);}
.im-btn.on{border-color:var(--sd);background:#EFF3EE;color:#3A5A3A;}
.scan-frame{background:var(--bgsec);border:1.5px dashed var(--sage);border-radius:10px;padding:28px 20px;text-align:center;margin-bottom:12px;}
.scan-frame i{font-size:36px;color:var(--sd);margin-bottom:8px;display:block;}
.scan-frame p{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.scan-frame small{font-size:11px;color:var(--muted);}
.news-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cat-chip{padding:6px 13px;border-radius:16px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.15s;}
.cat-chip:hover{border-color:var(--sd);}
.cat-chip.on{background:var(--sd);border-color:var(--sd);color:#EFF3EE;font-weight:500;}
.article-card{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer;transition:border-color 0.15s;}
.article-card:hover{border-color:var(--sd);}
.article-body{padding:14px 16px;}
.article-cat{font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--sd);margin-bottom:5px;}
.article-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px;}
.article-preview{font-size:12px;color:var(--muted);line-height:1.6;}
.article-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:0.5px solid var(--border);background:var(--bgsec);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:14px;padding:0;}
.back-btn:hover{color:var(--sd);}
.article-full-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:12px;}
.article-full-body{font-size:13px;color:var(--text);line-height:1.85;white-space:pre-wrap;}
</style>

const ARTICLES=[
  {id:1,cat:'Pregnancy',icon:'ti-heart',tag:'Essential read',title:'Skincare ingredients to avoid during pregnancy',preview:"Retinol, high-dose salicylic acid, and certain essential oils are commonly flagged.",body:"During pregnancy, some ingredients are best avoided.\n\nAvoid:\n- Retinol & retinoids - linked to birth defects at high doses\n- High-concentration salicylic acid\n- Hydroquinone - high absorption rate\n- Chemical sunscreens (oxybenzone) - switch to mineral SPF\n- Strong essential oils (rosemary, clary sage)\n\nSafe alternatives:\n- Niacinamide, Vitamin C, Hyaluronic acid\n- Azelaic acid - safe for acne and pigmentation\n- Mineral SPF (zinc oxide)\n- Low-concentration glycolic acid\n\nAlways consult your midwife or dermatologist."},
  {id:2,cat:'Ingredients',icon:'ti-flask',tag:'Ingredient guide',title:'Niacinamide: the ingredient your skin probably needs',preview:"One of the most versatile actives - here's what it actually does.",body:"Niacinamide (vitamin B3) is one of the best-studied skincare ingredients.\n\nWhat it does:\n- Reduces pore appearance\n- Fades dark spots\n- Strengthens the skin barrier\n- Calms redness and inflammation\n- Improves skin texture\n\nBest concentration: 5-10%.\nApply after cleansing, before heavier moisturisers.\nWorks well with most other actives."},
  {id:3,cat:'Routine',icon:'ti-sun',tag:'How-to guide',title:'How to layer your skincare - in the right order',preview:'Getting the order wrong can stop products working.',body:"Rule: thinnest to thickest.\n\nAM: Cleanser - Toner (optional) - Serum - Moisturiser - SPF\nPM: Double cleanse - Toner (optional) - Treatment serum - Moisturiser\n\nKey rules:\n- Eye cream before retinoid\n- SPF is always last in the morning\n- Wait 60-90 seconds between steps if possible"},

  var pg=isPregnant()?'IMPORTANT: User is pregnant or breastfeeding. Exclude ALL retinoids, retinol, high-dose salicylic acid, chemical sunscreens, hydroquinone. Pregnancy-safe only. Open with a clear pregnancy safety note.':'';
  var sf=isSensitive()?'Fragrance-free and alcohol-free formulations only.':'';
  var ff=routineFilters.map(function(f){return ({fragrance_free:'All products fragrance-free.',oil_free:'All products oil-free non-comedogenic.',fungal_acne_safe:'Fungal acne-safe only.',pregnancy_safe:'Pregnancy-safe only.',no_retinol:'No retinol or retinoids.',sensitive_skin:'Extra gentle, no strong actives.',silicone_free:'Silicone-free only.'})[f]||'';}).filter(Boolean).join(' ');
  var budget_nzd=budget==='Budget-friendly'?'Price guidance: budget-friendly NZD $8-25 per product, available at Chemist Warehouse, Countdown, or pharmacies.':budget==='Luxury'?'Price guidance: premium NZD $60-200+ per product, available at department stores, Mecca, or specialist skincare retailers.':'Price guidance: mid-range NZD $25-70 per product, available at pharmacies, Mecca, or online.';
  var order='CRITICAL STEP ORDER: List steps in exact application order top to bottom. Eye cream MUST come BEFORE retinoid. Retinoid goes AFTER eye cream and serum, BEFORE moisturiser. Morning routine MUST always end with SPF as the absolute final step - never omit. Evening routine MUST always end with a night moisturiser or night cream as the final step - never omit. Include as many steps as genuinely needed for this persons concerns.';
  var brand_note=brands?'USER PREFERRED BRANDS: '+brands+'. For each step, where a product LINE from these brands is a strong match, suggest it by product LINE only - never an exact product name or SKU. Example: say "the CeraVe hydrating range" not "CeraVe Hydrating Cleanser 473ml". Only suggest lines you are genuinely confident suit this persons skin profile. If uncertain about a brand, say so. If a brand may be hard to find in New Zealand, note this. Only suggest brands the user has listed - never add others.':'';
  var caveats_with_brands='IMPORTANT NOTES section (include at the very end): 1. If you experience any reaction such as redness, stinging, burning, or breakouts after introducing a new product, stop using it immediately and consult a pharmacist or doctor before continuing. 2. EclaireSkin does not receive any advertising fees, commissions, or sponsorship from any brand or product mentioned. All suggestions are based solely on your skin profile and preferred brands. 3. Product line suggestions are based on general formulation knowledge. Formulations change - always check the current ingredient list on the label before buying, especially if you have known sensitivities.';
  var caveats_no_brands='GOOD TO KNOW section (include at the very end): 1. If you experience any reaction after starting a new product, stop using it and consult a pharmacist or doctor. 2. Introduce one new product at a time so you can identify what works for your skin.';
  var caveats=brands?caveats_with_brands:caveats_no_brands;
  var base='You are a warm expert skincare advisor. '+pg+' '+sf+' '+ff+' '+order+' '+budget_nzd+' '+brand_note+' Never suggest exact product SKUs. Never suggest brands the user has not listed.';
  var fmt_basic='Format: YOUR MORNING ROUTINE (X steps, about X minutes) - list each step as: Step N: [Step name] - [what to look for in plain English + price range'+(brands?', product line from preferred brands if suitable':'')+'] - list all steps ending with SPF - YOUR EVENING ROUTINE same format ending with night moisturiser - NOTES - one paragraph per step with why this person needs it and exactly how to use it - '+caveats;
  var fmt_adv='Format: YOUR MORNING ROUTINE - Step N: [Step name] - [ingredient type to look for'+(brands?', product line from preferred brands if suitable':'')+'] - all steps ending with SPF - YOUR EVENING ROUTINE same format ending with night moisturiser - NOTES - brief note per step explaining why it suits this persons skin, ingredient conflicts, timing - '+caveats;
  if(isBasic){return base+' Write in plain friendly English, no jargon, no Latin ingredient names. '+fmt_basic;}
  return base+' Use ingredient-level detail for an experienced user. '+fmt_adv;
}

async function claude(messages,system){var r=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,system:system,messages:messages})});var d=await r.json();return d.content&&d.content[0]?d.content[0].text:'Unable to generate response.';}

function compressImg(file,maxW,quality,cb){var img=new Image();var url=URL.createObjectURL(file);img.onload=function(){var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}var canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);cb(canvas.toDataURL('image/jpeg',quality).split(',')[1]);};img.src=url;}

function renderQ(){var s=STEPS[step];sel=profile&&profile[s.id]?(Array.isArray(profile[s.id])?[...profile[s.id]]:[profile[s.id]]):[];var pct=Math.round(((step+1)/STEPS.length)*100);document.getElementById('qpf').style.width=pct+'%';document.getElementById('qsl').textContent='Step '+(step+1)+' of '+STEPS.length;var optsH=s.opts.map(function(o){return '<button class="ob'+(sel.includes(o.name)?' sel':'')+'" onclick="qsel(\''+o.name.replace(/'/g,"\\'")+"',"+s.multi+')" data-v="'+o.name.replace(/"/g,'&quot;')+'"><div class="oi" style="'+(sel.includes(o.name)?'background:var(--sd);color:#EFF3EE;':'')+'"><i class="ti '+o.icon+'"></i></div><div><div class="on-name">'+o.name+'</div>'+(o.desc?'<div class="on-desc">'+o.desc+'</div>':'')+'</div></button>';}).join('');document.getElementById('main').innerHTML='<div class="pnl" style="overflow-y:auto;flex:1;"><div style="font-family:\'Cormorant Garamond\',serif;font-size:18px;font-weight:500;color:var(--text);margin-bottom:4px;">'+s.title+'</div><div style="font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:300;">'+s.sub+'</div><div class="opt-grid '+(s.cols===1?'c1':'')+'">'+optsH+'</div></div><div class="qfooter">'+(step>0?'<button class="q-back" onclick="qback()"><i class="ti ti-arrow-left"></i> Back</button>':'<div></div>')+'<button class="btn" id="qnxt" onclick="qnext()" style="margin-top:0;" '+(sel.length===0?'disabled':'')+'>'+(step===STEPS.length-1?'Build my profile':'Continue')+' <i class="ti ti-arrow-right"></i></button></div>';}
function qsel(v,multi){if(multi){var i=sel.indexOf(v);if(i>-1)sel.splice(i,1);else sel.push(v);}else sel=[v];document.querySelectorAll('.ob').forEach(function(b){var s2=sel.includes(b.dataset.v);b.classList.toggle('sel',s2);b.querySelector('.oi').style.background=s2?'var(--sd)':'';b.querySelector('.oi').style.color=s2?'#EFF3EE':'';});document.getElementById('qnxt').disabled=sel.length===0;}
function qnext(){if(!profile)profile={};profile[STEPS[step].id]=STEPS[step].multi?[...sel]:sel[0];if(step<STEPS.length-1){step++;renderQ();}else{completeProfile();}}
function qback(){if(step>0){step--;renderQ();}}

async function completeProfile(){stor('ec_profile',profile);document.getElementById('qpb').style.display='none';document.getElementById('qsl').style.display='none';document.getElementById('hdr-sub').textContent='Your skin profile is ready';var t=Array.isArray(profile.triggers)?profile.triggers.filter(function(x){return x!=='No known triggers';}).join(', '):'';var ls=profile.life_stage&&profile.life_stage!=='None of the above'?'<div class="lbl" style="margin-top:10px;">Life stage</div><div class="tag-row" style="margin-bottom:10px;"><span class="tag r"><i class="ti ti-heart" style="font-size:11px;"></i> '+profile.life_stage+'</span></div>':'';document.getElementById('main').innerHTML='<div class="pnl" style="overflow-y:auto;flex:1;"><div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="width:36px;height:36px;border-radius:50%;background:var(--sd);display:flex;align-items:center;justify-content:center;"><i class="ti ti-user" style="font-size:16px;color:#EFF3EE;"></i></div><div style="flex:1;"><div style="font-family:\'Cormorant Garamond\',serif;font-size:17px;color:var(--text);">Your skin profile</div><div style="font-size:11px;color:var(--muted);margin-top:1px;">Saved to this device</div></div><span class="saved-badge"><i class="ti ti-device-floppy"></i> Saved</span></div><div class="lbl">Skin type & goal</div><div class="tag-row" style="margin-bottom:10px;"><span class="tag">'+profile.skin_type+'</span><span class="tag w">'+profile.goals+'</span><span class="tag w">'+profile.budget+'</span></div>'+ls+'<div class="lbl">Concerns</div><div class="tag-row" style="margin-bottom:10px;">'+(Array.isArray(profile.concerns)?profile.concerns:[profile.concerns]).map(function(x){return '<span class="tag">'+x+'</span>';}).join('')+'</div>'+(t?'<div class="lbl">Triggers</div><div class="tag-row" style="margin-bottom:10px;">'+t.split(', ').map(function(x){return '<span class="tag">'+x+'</span>';}).join('')+'</div>':'')+'<div class="lbl" style="margin-top:10px;">AI skin summary</div><div class="ai-box" id="ai-sum"><div class="dots"><span></span><span></span><span></span></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;"><i class="ti ti-info-circle" style="font-size:12px;"></i> AI-generated summary for reference only.</div></div><button class="btn" onclick="enterApp()">Enter the app <i class="ti ti-arrow-right"></i></button><button class="btn-out" onclick="step=0;showQuiz()"><i class="ti ti-refresh"></i> Retake quiz</button></div>';try{var txt=await claude([{role:'user',content:profileCtx()+' Write a warm, specific 2-sentence skin summary. Plain text only.'}],'You are a skincare expert. 2-sentence warm personalised skin summary. No bullet points, no brand names.');document.getElementById('ai-sum').textContent=txt;}catch(e){document.getElementById('ai-sum').textContent='Profile saved. Head into the app to get started.';}}

function routineHTML(){var exp=expLevel();var isBasic=exp<=2;var ff=ROUTINE_FILTERS.map(function(f){var ao=(f.id==='pregnancy_safe'&&isPregnant())||(f.id==='fragrance_free'&&isSensitive());var on=ao||routineFilters.includes(f.id);return '<div class="filter-check'+(on?' on':'')+'" onclick="toggleFilter(\''+f.id+'\','+ao+')" id="fc-'+f.id+'"><div class="fc-box">'+(on?'<i class="ti ti-check" style="font-size:11px;color:#EFF3EE;"></i>':'')+'</div><span class="fc-lbl">'+f.label+(ao?' (auto)':'')+'</span></div>';}).join('');var saved=savedRoutine?'<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div class="card-title">Saved routine</div><span class="saved-badge"><i class="ti ti-device-floppy"></i> '+savedRoutine.savedAt+'</span></div><div style="font-size:13px;color:var(--text);line-height:1.85;white-space:pre-wrap;">'+savedRoutine.text+'</div><button class="btn-out" onclick="clearRoutine()"><i class="ti ti-trash"></i> Clear saved routine</button></div>':'<div class="empty-state"><i class="ti ti-calendar-check"></i><p>No saved routine yet.<br>Build one below.</p></div>';var toggle='<div style="display:flex;gap:8px;margin-bottom:12px;"><button onclick="setRoutineMode(true)" style="flex:1;padding:10px 8px;border-radius:9px;border:1.5px solid '+(isBasic?'var(--sd)':'var(--border)')+';background:'+(isBasic?'#EFF3EE':'var(--card)')+';color:'+(isBasic?'#3A5A3A':'var(--muted)')+';font-family:DM Sans,sans-serif;font-size:12px;font-weight:'+(isBasic?500:400)+';cursor:pointer;"><i class="ti ti-leaf" style="display:block;font-size:16px;margin:0 auto 3px;"></i>Beginner<div style="font-size:10px;opacity:0.7;margin-top:2px;">Plain English guide</div></button><button onclick="setRoutineMode(false)" style="flex:1;padding:10px 8px;border-radius:9px;border:1.5px solid '+(!isBasic?'var(--sd)':'var(--border)')+';background:'+(!isBasic?'#EFF3EE':'var(--card)')+';color:'+(!isBasic?'#3A5A3A':'var(--muted)')+';font-family:DM Sans,s e to add?</div><textarea id="rnotes" placeholder="'+(isBasic?'e.g. I want to keep it simple, about 5 minutes morning and night...':'e.g. I already use vitamin C, avoiding exfoliants this month...')+'" style="min-height:50px;"></textarea><button class="btn" id="btn-r" onclick="runRoutine()">Build my routine <i class="ti ti-arrow-right"></i></button></div>'+resBox('res-r','ti-sun','var(--warm)','Your personalised routine')+'<div id="save-r-wrap" style="display:none;margin-top:8px;"><button class="btn" id="btn-save-r" onclick="saveThisRoutine()"><i class="ti ti-device-floppy"></i> Save this routine</button></div>';}

p>No articles in this category.</p></div>');}

function settingsHTML(){var notifs=[{id:'am',title:'Morning reminder',sub:'AM skincare routine',time:'07:30'},{id:'pm',title:'Evening reminder',sub:'PM skincare routine',time:'21:00'},{id:'weekly',title:'Weekly check-in',sub:'Review how your skin is doing',time:'09:00'}];var gs=function(id){try{return JSON.parse(localStorage.getItem('notif_'+id)||JSON.stringify({on:false,time:notifs.find(function(n){return n.id===id;}).time}));}catch(e){return {on:false,time:'08:00'};}};var rows=notifs.map(function(n){var s=gs(n.id);return '<div class="notif-row" id="nrow-'+n.id+'"><div style="flex:1;"><div class="n-title">'+n.title+'</div><div class="n-sub">'+n.sub+'</div>'+(s.on?'<input type="time" class="time-pick" id="ntime-'+n.id+'" value="'+s.time+'" onchange="saveNotif(\''+n.id+'\')"/>':'')+'</div><label class="toggle"><input type="checkbox" '+(s.on?'checked':'')+' onchange="toggleNotif(\''+n.id+'\',\''+n.time+'\')"/><span class="tslider"></span></label></div>';}).join('');return '<div class="card"><div class="card-title" style="margin-bottom:4px;">Routine reminders</div><div style="font-size:12px;color:var(--muted);margin-bottom:14px;">Browser notifications - must have the app open.</div>'+rows+'</div><div class="card"><div class="card-title" style="margin-bottom:4px;">Your profile</div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;">'+(profile?'Skin profile saved on this device.':'No profile saved yet.')+'</div><button class="btn-sm" onclick="step=0;showQuiz()"><i class="ti ti-refresh"></i> '+(profile?'Retake quiz':'Start quiz')+'</button>'+(profile?'<button class="btn-out" onclick="clearProfile()"><i class="ti ti-trash"></i> Clear profile</button>':'')+'</div><div style="font-size:11px;color:var(--muted);text-align:center;padding-bottom:4px;line-height:1.6;">All data stays on your device only.</div>';}

function handleImg(e){var f=e.target.files[0];if(!f)return;compressImg(f,1024,0.7,function(b64){imgB64=b64;var img=document.getElementById('prev');img.src='data:image/jpeg;base64,'+b64;img.style.display='block';document.getElementById('upz').style.cssText+='border-style:solid;border-color:var(--sd);';});}
function handleIngImg(e){var f=e.target.files[0];if(!f)return;compressImg(f,1024,0.7,function(b64){ingImgB64=b64;var img=document.getElementById('ing-prev');if(img){img.src='data:image/jpeg;base64,'+b64;img.style.display='block';}var b=document.getElementById('btn-ing');if(b)b.disabled=false;var z=document.getElementById('ing-upz');if(z)z.style.cssText+='border-style:solid;border-color:var(--sd)';});}

function ingMode(m){ingMode_=m;['photo','search','paste'].forEach(function(x){var b=document.getElementById('im-'+x);if(b)b.classList.toggle('on',x===m);});var area=document.getElementById('ing-area');if(m==='photo'){area.innerHTML='<img id="ing-prev" class="preview-img" alt="Label"/><div class="upload-zone" id="ing-upz"><input type="file" accept="image/*" onchange="handleIngImg(event)"/><i class="ti ti-camera" style="font-size:26px;color:var(--sd);"></i><div style="font-size:13px;font-weight:500;color:var(--text);margin-top:6px;">Photograph the ingredient label</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Claude reads ingredients directly from the photo</div></div><button class="btn" id="btn-ing" onclick="runIng()" '+(ingImgB64?'':'disabled')+'>Analyse label <i class="ti ti-arrow-right"></i></button>';}else if(m==='search'){area.innerHTML='<div style="display:flex;gap:8px;margin-bottom:6px;"><input id="sq" style="flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:DM Sans,sans-serif;font-size:13px;color:var(--text);background:var(--card);" placeholder="e.g. CeraVe Moisturising Cream..." onkeydown="if(event.key===\'Enter\')doSearch()"/><button class="btn-sm" onclick="doSearch()"><i class="ti ti-search"></i></button></div><div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Type brand + product name for best results</div><div id="sresults"></div><button class="btn" id="btn-ing" onclick="runIng()" disabled>Analyse selected product <i class="ti ti-arrow-right"></i></button>';}else{area.innerHTML='<textarea id="paste-ing" placeholder="e.g. Aqua, Niacinamide, Glycerin, Retinol, Parfum..."></textarea><button class="btn" id="btn-ing" onclick="runIng()">Analyse ingredients <i class="ti ti-arrow-right"></i></button>';}}

async function doSearch(){var q=document.getElementById('sq').value.trim();if(!q)return;ingSearchPick=null;document.getElementById('btn-ing').disabled=true;document.getElementById('sresults').innerHTML='<div style="padding:12px;text-align:center;font-size:13px;color:var(--muted);"><div class="dots"><span></span><span></span><span></span></div></div>';try{var r=await fetch('/api/analyse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,system:'Return ONLY a JSON array (no markdown) of up to 4 skincare products. Each: {"name":"","brand":"","type":"","icon":"ti-droplet or ti-sparkles or ti-sun or ti-leaf or ti-shield"}',messages:[{role:'user',content:'Find: "'+q+'"'}]})});var d=await r.json();var products=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());document.getElementById('sresults').innerHTML=products.map(function(p,i){return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid var(--border);border-radius:9px;margin-bottom:6px;cursor:pointer;background:var(--card);" id="sp-'+i+'" onclick="pickSearch('+i+',\''+((p.brand||'').replace(/'/g,"\\'")+'\',\''+(p.name||'').replace(/'/g,"\\'")+'\',\''+p.type||'')+'\'  )"><div class="oi"><i class="ti '+(p.icon||'ti-droplet')+'"></i></div><div><div style="font-size:13px;font-weight:500;color:var(--text);">'+p.name+'</div><div style="font-size:11px;color:var(--muted);">'+p.brand+' - '+p.type+'</div></div><i class="ti ti-circle-check" id="spck-'+i+'" style="margin-left:auto;font-size:17px;color:var(--sd);display:none;"></i></div>';}).join('');}catch(e){document.getElementById('sresults').innerHTML='<p style="font-size:13px;color:var(--muted);">No results - try paste instead.</p>';}}
function pickSearch(i,brand,name,type){document.querySelectorAll('[id^="spck-"]').forEach(function(el){el.style.display='none';});document.getElementById('spck-'+i).style.display='block';ingSearchPick={brand:brand,name:name,type:type};document.getElementById('btn-ing').disabled=false;}

var INGSYS='You are a cosmetic chemist. Analyse skincare ingredients in plain text:\n1. What this product does\n2. Key beneficial ingredients - name + function for this skin profile\n3. Potential irritants - flag with a warning and explain\n4. Unnecessary ingredients - flag anything that adds no value for this persons concerns\n5. Skin type fit - personalised verdict\n6. Verdict - one sentence\nUnder 350 words. No brand recommendations.';
function ingSys(){var pg=isPregnant()?'\nFlag pregnancy-unsafe ingredients (retinoids, high-dose salicylics, hydroquinone, chemical SPF) with AVOID DURING PREGNANCY.':'';var sf=isSensitive()?'\nFlag fragrance, essential oils, denatured alcohol with FRAGRANCE ALERT.':'';return INGSYS+pg+sf;}

async function runIng(){var btn=document.getElementById('btn-ing');btn.disabled=true;document.getElementById('res-ing').classList.add('show');document.getElementById('res-ing-txt').innerHTML='<div style="padding:14px 16px;"><div class="dots"><span></span><span></span><span></span></div></div>';var ab=document.getElementById('alt-box');if(ab)ab.classList.remove('show');var ctx=profileCtx();var pl='';try{var txt;if(ingMode_==='photo'&&ingImgB64){txt=await claude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:ingImgB64}},{type:'text',text:ctx+'\nRead ingredient list from this label and analyse for this person.'}]}],ingSys());}else if(ingMode_==='search'&&ingSearchPick){pl=ingSearchPick.brand+' '+ingSearchPick.name;txt=await claude([{role:'user',content:ctx+'\nAnalyse: '+pl+' ('+ingSearchPick.type+'). Note formula may vary.'}],ingSys());}else{var p=document.getElementById('paste-ing');if(!p||!p.value.trim()){alert('Please enter ingredients.');btn.disabled=false;return;}txt=await claude([{role:'user',content:ctx+'\nIngredients:\n'+p.value.trim()}],ingSys());}document.getElementById('res-ing-txt').textContent=txt;await runAlts(ctx,pl);}catch(e){document.getElementById('res-ing-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}

async function runAlts(ctx,pl){var ab=document.getElementById('alt-box');var at=document.getElementById('alt-box-txt');if(!ab||!at)return;ab.classList.add('show');at.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';try{var prompt=pl?ctx+'\nSuggest 2-3 specific ingredient types that would work better than what was found in '+pl+' for this person. Explain what to look for on labels and why each suits them. Ingredient types only, no brand names. Concise.':ctx+'\nSuggest 2-3 ingredient types that would complement or improve this routine for this person. No brand names. Concise.';var txt=await claude([{role:'user',content:prompt}],'Skincare ingredient expert. Suggest better ingredient alternatives based on skin profile. Types only, no brands. Plain text, 2-3 suggestions.');at.textContent=txt;}catch(e){at.textContent='Unable to generate alternatives.';}}

function toggleFilter(id,autoOn){if(autoOn)return;var idx=routineFilters.indexOf(id);if(idx>-1)routineFilters.splice(idx,1);else routineFilters.push(id);var el=document.getElementById('fc-'+id);if(!el)return;var on=routineFilters.includes(id);el.classList.toggle('on',on);var box=el.querySelector('.fc-box');if(box)box.innerHTML=on?'<i class="ti ti-check" style="font-size:11px;color:#EFF3EE;"></i>':'';}

async function runAnalysis(){var btn=document.getElementById('btn-a');btn.disabled=true;setLoading('res-a','res-a-txt');var notes=document.getElementById('anotes').value.trim();var content=[];if(imgB64)content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgB64}});content.push({type:'text',text:profileCtx()+'\nNotes: '+(notes||'None')+'.'});try{var txt=await claude([{role:'user',content:content}],'You are a skincare advisor. Analyse skin in plain text:\n1. Skin assessment\n2. Key priorities - 2-3 focus areas\n3. Recommended ingredients - types + why they suit this person\n4. Ingredients to avoid\nWarm, evidence-based, under 350 words. No brand names.');document.getElementById('res-a-txt').textContent=txt;}catch(e){document.getElementById('res-a-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}

async function runRoutine(){var btn=document.getElementById('btn-r');btn.disabled=true;setLoading('res-r','res-r-txt');if(isPregnant()&&!routineFilters.includes('pregnancy_safe'))routineFilters.push('pregnancy_safe');if(isSensitive()&&!routineFilters.includes('fragrance_free'))routineFilters.push('fragrance_free');var notes=document.getElementById('rnotes')?document.getElementById('rnotes').value.trim():'';var extras=document.getElementById('extra-steps')?document.getElementById('extra-steps').value.trim():'';var extraNote=extras?'The user also wants to include: '+extras+'. Work these into the routine in the correct position.':'';try{var txt=await claude([{role:'user',content:profileCtx()+'\nFilters: '+(routineFilters.join(', ')||'none')+'.\nNotes: '+(notes||'None')+'. '+extraNote}],routineSys());document.getElementById('res-r-txt').textContent=txt;var wrap=document.getElementById('save-r-wrap');if(wrap)wrap.style.display='block';}catch(e){document.getElementById('res-r-txt').textContent='Something went wrong. Please try again.';}btn.disabled=false;}

async function saveThisRoutine(){var txt=document.getElementById('res-r-txt').textContent;if(!txt)return;savedRoutine={text:txt,savedAt:new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})};stor('ec_routine',savedRoutine);var btn=document.getElementById('btn-save-r');btn.innerHTML='<i class="ti ti-circle-check"></i> Saved!';btn.disabled=true;setTimeout(function(){renderApp('routine');},1200);}
async function clearRoutine(){savedRoutine=null;stor('ec_routine',null);renderApp('routine');}
async function clearProfile(){if(!confirm('Clear your saved skin profile?'))return;profile=null;routineFilters=[];stor('ec_profile',null);step=0;showQuiz();}
function toggleNotif(id,defaultTime){var inp=document.querySelector('#nrow-'+id+' input[type=checkbox]');var on=inp.checked;try{localStorage.setItem('notif_'+id,JSON.stringify({on:on,time:defaultTime}));}catch(e){}if(on){Notification.requestPermission().then(function(p){if(p==='granted'){var parts=defaultTime.split(':').map(Number);var now=new Date(),target=new Date();target.setHours(parts[0],parts[1],0,0);if(target<=now)target.setDate(target.getDate()+1);setTimeout(function(){new Notification('EclaireSkin',{body:'Time for your skincare routine.'});},target-now);}});}renderApp('settings');}
function saveNotif(id){var t=document.getElementById('ntime-'+id);if(!t)return;try{var s=JSON.parse(localStorage.getItem('notif_'+id)||'{}');s.time=t.value;localStorage.setItem('notif_'+id,JSON.stringify(s));}catch(e){}}
load_();
</script>
</body>
</html>
