<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ÉclaireSkin — AI Skincare Advisor</title>
<meta name="description" content="Your personal AI skincare advisor. Built for your skin, private by design."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sd:#5A7A5A;--sage:#6B8F6B;--sl:#EFF3EE;
  --bg:#F8F4EE;--text:#2C2C28;--muted:#5C5C52;--border:#E0E0D8;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A1A18;--text:#E8E4DC;--muted:#B8B8AC;--border:#3A3A35;--sl:#D0D8D0;--sage:#8A9E8A;
}}

html,body{height:100%;width:100%;}

body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(160deg,#3D5C3D 0%,#5A7A5A 55%,#7A9E7A 100%);
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* Subtle texture overlay */
body::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;pointer-events:none;
}

/* Centre content */
.centre{
  display:flex;flex-direction:column;align-items:center;
  gap:0;text-align:center;
  position:relative;z-index:1;
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(36px,8vw,52px);
  font-weight:400;color:#EFF3EE;
  letter-spacing:0.04em;
  opacity:0;
  animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}

.divider{
  width:28px;height:1px;
  background:rgba(239,243,238,0.35);
  margin:18px auto;
  opacity:0;
  animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.55s forwards;
}

.tagline{
  font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:300;
  color:rgba(239,243,238,0.6);
  letter-spacing:0.14em;text-transform:uppercase;
  opacity:0;
  animation:fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
}

/* Progress dot */
.progress{
  display:flex;gap:5px;margin-top:40px;
  opacity:0;
  animation:fadeUp 0.6s ease 1.2s forwards;
}
.dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(239,243,238,0.25);
}
.dot.active{
  background:rgba(239,243,238,0.7);
  animation:pulse 1.5s ease 1.4s infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:0.7;}
  50%{transform:scale(1.4);opacity:1;}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

/* Page fade out */
body.fade-out{
  animation:pageFade 0.7s ease forwards;
}
@keyframes pageFade{
  to{opacity:0;}
}

/* Footer */
footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap;
  opacity:0;
  animation:fadeUp 0.8s ease 1s forwards;
  z-index:2;
}
footer span,footer a{
  font-size:10px;font-weight:400;
  color:rgba(239,243,238,0.4);
  letter-spacing:0.04em;
  text-decoration:none;
  transition:color 0.15s;
  white-space:nowrap;
}
footer a:hover{color:rgba(239,243,238,0.75);}
footer .sep{color:rgba(239,243,238,0.2);}
</style>
</head>
<body>

<div class="centre">
  <div class="logo">ÉclaireSkin</div>
  <div class="divider"></div>
  <div class="tagline">Begin again, gently.</div>
  <div class="progress">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<footer>
  <span>© 2026 ÉclaireSkin</span>
  <span class="sep">·</span>
  <a href="/terms">Terms of Use</a>
<span class="sep">·</span>
<a href="/disclaimer">Disclaimer</a>
<span class="sep">·</span>
<a href="/privacy">Privacy Policy</a>
  <span class="sep">·</span>
  <a href="/privacy#cookies">Cookies</a>
</footer>

<script>
  // Redirect to app after 4 seconds
  setTimeout(function(){
    document.body.classList.add('fade-out');
    setTimeout(function(){
      window.location.href='/app';
    },700);
  },3300);
</script>
</body>
</html>
